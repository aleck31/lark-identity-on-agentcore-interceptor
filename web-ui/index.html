<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lark Agent</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <h1>Lark Agent</h1>
    <span id="status" class="status">connecting…</span>
  </header>

  <main id="chat" class="chat" aria-live="polite"></main>

  <form id="composer" class="composer" autocomplete="off">
    <input id="input" type="text" placeholder="Message the agent…" disabled />
    <button id="send" type="submit" disabled>Send</button>
  </form>

  <!-- Lark H5 JS SDK (desktop client免登). Loaded best-effort; the app falls
       back to an in-client notice if unavailable. -->
  <script src="https://lf-package-cn.feishucdn.com/obj/feishu-static/lark/passport/qrcode/LarkSSOSDKWebQRCode-1.0.3.js"></script>
  <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.34.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
